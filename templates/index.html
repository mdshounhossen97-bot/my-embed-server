<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA LEAD-X | Enterprise Generation Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .glow-card { background: rgba(18, 18, 18, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .glow-card:hover { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); }
        .btn-premium { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: 0.3s; }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen">
    <nav class="border-b border-white/5 p-6 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/40">
                    <i class="fas fa-bolt text-xl"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tighter">LEAD<span class="text-blue-500">X</span> PRO</span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400 uppercase tracking-widest">
                <a href="#" class="hover:text-blue-500">Dashboard</a>
                <a href="#" class="hover:text-blue-500">Tier Analysis</a>
                <a href="#" class="hover:text-blue-500">API Access</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-10">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-12">
            <div class="lg:col-span-3 glow-card p-8 rounded-[2.5rem]">
                <div class="flex flex-wrap gap-6 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 block">Target Region</label>
                        <select id="country" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all">
                            <optgroup label="Tier 1 - Top Payout">
                                <option value="USA">United States</option>
                                <option value="UK">United Kingdom</option>
                                <option value="Germany">Germany</option>
                                <option value="Canada">Canada</option>
                            </optgroup>
                            <optgroup label="Tier 2 - Volume">
                                <option value="France">France</option>
                                <option value="Italy">Italy</option>
                                <option value="Spain">Spain</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 block">CPA Niche</label>
                        <select id="category" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all">
                            <option value="Dating">Dating & Adult</option>
                            <option value="Casino">Casino & Sweepstakes</option>
                            <option value="GoogleChat">Google Chat Active</option>
                        </select>
                    </div>
                    <button onclick="startMining()" class="btn-premium px-10 py-4 rounded-2xl font-bold text-sm uppercase tracking-wider active:scale-95">
                        Start Mining
                    </button>
                </div>
            </div>
            
            <div class="glow-card p-8 rounded-[2.5rem] flex flex-col justify-center text-center">
                <span class="text-gray-500 text-xs font-bold uppercase mb-2">System Accuracy</span>
                <span class="text-4xl font-black text-blue-500">99.2%</span>
                <div class="w-full bg-gray-800 h-1.5 rounded-full mt-4 overflow-hidden">
                    <div class="bg-blue-500 h-full w-[99%]"></div>
                </div>
            </div>
        </div>

        <div class="glow-card rounded-[2.5rem] overflow-hidden">
            <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 class="font-bold uppercase text-xs tracking-[0.2em]">Real-Time Data Feed</h3>
                <button onclick="exportCSV()" class="text-xs font-bold text-blue-500 border border-blue-500/30 px-4 py-2 rounded-full hover:bg-blue-500 hover:text-white transition-all">
                    EXPORT ALL (CSV)
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] uppercase text-gray-500 bg-black/20">
                        <tr>
                            <th class="p-6">Target Identity</th>
                            <th class="p-6">Source</th>
                            <th class="p-6">Tier Status</th>
                            <th class="p-6">Quality Score</th>
                            <th class="p-6">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leadTable" class="divide-y divide-white/5">
                        </tbody>
                </table>
                <div id="loader" class="hidden p-20 text-center shimmer">
                    <p class="animate-pulse text-blue-400 font-bold">Scanning Global Satellites for Live Leads...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let sessionLeads = [];

        async function startMining() {
            const btn = document.querySelector('.btn-premium');
            const loader = document.getElementById('loader');
            const table = id('leadTable');
            
            table.innerHTML = '';
            loader.classList.remove('hidden');
            btn.disabled = true;

            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    country: id('country').value,
                    category: id('category').value
                })
            });
            const data = await res.json();
            
            loader.classList.add('hidden');
            btn.disabled = false;
            sessionLeads = data;

            if(data.length === 0) {
                table.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-600">No leads found in this sector. Try another country.</td></tr>';
                return;
            }

            data.forEach(lead => {
                table.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-all">
                        <td class="p-6 font-mono text-blue-400 text-sm">${lead.email}</td>
                        <td class="p-6"><span class="bg-white/5 px-3 py-1 rounded-full text-[10px]">${lead.source}</span></td>
                        <td class="p-6 text-xs text-gray-400">${lead.tier}</td>
                        <td class="p-6">
                            <div class="flex items-center gap-2">
                                <span class="text-emerald-500 font-bold">${lead.quality}%</span>
                                <div class="w-12 bg-gray-800 h-1 rounded-full"><div class="bg-emerald-500 h-full" style="width:${lead.quality}%"></div></div>
                            </div>
                        </td>
                        <td class="p-6">
                            <button onclick="copySingle('${lead.email}', this)" class="bg-white/5 hover:bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold transition-all">COPY</button>
                        </td>
                    </tr>
                `;
            });
        }

        function id(name) { return document.getElementById(name); }

        function copySingle(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerText = "COPIED";
            setTimeout(() => btn.innerText = "COPY", 1000);
        }

        function exportCSV() {
            const blob = new Blob([sessionLeads.map(l => l.email).join('\n')], {type: 'text/csv'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'leads_premium.csv';
            a.click();
        }
    </script>
</body>
</html>
