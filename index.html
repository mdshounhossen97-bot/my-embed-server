<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LEADX PRO | Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-ui { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .accent-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .loader-bar { height: 2px; width: 100%; background: linear-gradient(90deg, transparent, #3b82f6, transparent); background-size: 200% 100%; animation: loading 2s infinite linear; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen">
    <nav class="p-6 border-b border-white/5 glass-ui sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black accent-glow tracking-tighter"><i class="fas fa-microchip mr-2 text-blue-500"></i>LEADX <span class="text-blue-500">PRO</span></h1>
            <div class="px-4 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[10px] font-bold uppercase tracking-widest">
                <i class="fas fa-circle animate-pulse mr-2"></i>Server: Active
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="glass-ui rounded-[2rem] p-8 mb-12 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-end">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Region Selection</label>
                    <select id="country" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm font-medium">
                        <option value="USA">🇺🇸 United States (Tier 1)</option>
                        <option value="UK">🇬🇧 United Kingdom (Tier 1)</option>
                        <option value="Germany">🇩🇪 Germany (Tier 1)</option>
                        <option value="France">🇫🇷 France (Tier 2)</option>
                        <option value="Italy">🇮🇹 Italy (Tier 2)</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Niche Targeting</label>
                    <select id="category" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm font-medium">
                        <option value="Dating">Dating & Adult Chat</option>
                        <option value="GoogleChat">Direct Google Chat</option>
                        <option value="CPA">Generic CPA Leads</option>
                    </select>
                </div>
                <button onclick="mineLeads()" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-lg shadow-blue-600/20 transition-all active:scale-95">
                    Start Extraction
                </button>
            </div>
        </div>

        <div id="loadingUI" class="hidden mb-12">
            <div class="loader-bar"></div>
            <p class="text-center text-[10px] text-blue-400 mt-4 font-bold uppercase tracking-[0.3em]">Mining Open-Source Satellites...</p>
        </div>

        <div class="glass-ui rounded-[2rem] overflow-hidden">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Verified Data Feed</h3>
                <button onclick="exportAll()" class="text-[10px] font-bold text-blue-400 border border-blue-400/20 px-4 py-2 rounded-full hover:bg-blue-400 hover:text-white transition-all">Bulk Export</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="text-[10px] text-slate-500 uppercase bg-white/5">
                        <tr>
                            <th class="p-6 text-left">Target ID</th>
                            <th class="p-6 text-left">Priority</th>
                            <th class="p-6 text-left">Quality</th>
                            <th class="p-6 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leadData" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let currentLeads = [];

        async function mineLeads() {
            const country = document.getElementById('country').value;
            const category = document.getElementById('category').value;
            const loader = document.getElementById('loadingUI');
            const table = document.getElementById('leadData');

            loader.classList.remove('hidden');
            table.innerHTML = '';

            try {
                const response = await fetch('/api/mine', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({country, category})
                });
                const data = await response.json();
                currentLeads = data;

                if(data.length === 0) {
                    table.innerHTML = '<tr><td colspan="4" class="p-20 text-center text-slate-600 font-bold uppercase text-xs tracking-widest">No Active Leads Found. Retry.</td></tr>';
                } else {
                    data.forEach(lead => {
                        table.innerHTML += `
                            <tr class="hover:bg-white/[0.02] transition-all">
                                <td class="p-6 font-mono text-sm text-blue-400">${lead.email}</td>
                                <td class="p-6"><span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold">${lead.tier}</span></td>
                                <td class="p-6 font-bold text-emerald-500">${lead.quality}%</td>
                                <td class="p-6 text-right">
                                    <button onclick="copyLead('${lead.email}', this)" class="bg-white/5 hover:bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold transition-all">Copy</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } finally {
                loader.classList.add('hidden');
            }
        }

        function copyLead(text, btn) {
            navigator.clipboard.writeText(text);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 1000);
        }

        function exportAll() {
            if(currentLeads.length === 0) return alert("Nothing to export.");
            const blob = new Blob([currentLeads.map(l => l.email).join('\n')], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'premium_leads.txt';
            a.click();
        }
    </script>
</body>
</html>
