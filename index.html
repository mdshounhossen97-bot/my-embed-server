<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Movie Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <video id="player" playsinline controls crossorigin></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        async function initPlayer() {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');
            const videoElement = document.getElementById('player');

            if (!movieId) {
                alert("Please provide a Movie Name or ID in the URL! Example: ?id=Avatar");
                return;
            }

            try {
                // আপনার রেন্ডার ইউআরএল অনুযায়ী এটি পরিবর্তন হবে
                const response = await fetch(`/stream?id=${movieId}`);
                const data = await response.json();

                if (data.video) {
                    if (Hls.isSupported() && data.video.includes('m3u8')) {
                        const hls = new Hls();
                        hls.loadSource(data.video);
                        hls.attachMedia(videoElement);
                    } else {
                        videoElement.src = data.video;
                    }
                    const player = new Plyr(videoElement, {
                        captions: { active: true, update: true, language: 'en' }
                    });
                } else {
                    document.body.innerHTML = "<h2 style='color:white'>Movie Not Found or Link Expired!</h2>";
                }
            } catch (err) {
                console.error("Error loading movie:", err);
            }
        }
        initPlayer();
    </script>
</body>
</html>
