<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style>
</head>
<body>
    <div id="player"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const type = params.get('type') || '1';
        
        // এটি আপনার রেন্ডার সার্ভার থেকে ডাটা লোড করবে
        document.getElementById('player').innerHTML = `<iframe src="/play?id=${id}&type=${type}" referrerpolicy="no-referrer" allowfullscreen></iframe>`;
    </script>
</body>
</html>
