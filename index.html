<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shawonflix AI - Moviebox Style</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .nav { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid #e50914; font-size: 28px; font-weight: bold; color: #e50914; }
        .search-box { margin: 40px auto; max-width: 600px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 5px; border: none; background: #222; color: #fff; outline: none; font-size: 16px; }
        button { padding: 15px 30px; background: #e50914; border: none; color: #fff; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #player-area { width: 95%; max-width: 1100px; height: 600px; margin: 20px auto; background: #000; display: none; border-radius: 10px; overflow: hidden; box-shadow: 0 0 40px rgba(229, 9, 20, 0.5); }
        iframe { width: 100%; height: 100%; border: none; }
        .server-list { margin-top: 20px; display: none; }
        .s-btn { padding: 10px 20px; margin: 5px; background: #333; color: #fff; border: 1px solid #444; cursor: pointer; border-radius: 5px; }
        .s-btn:hover { background: #e50914; }
    </style>
</head>
<body>

<div class="nav">SHAWONFLIX MOVIEBOX ENGINE</div>

<div class="search-box">
    <input type="text" id="tmdbId" placeholder="Enter TMDB ID (Get from themoviedb.org)">
    <button onclick="getMovie()">LOAD MOVIE</button>
</div>

<div id="player-area">
    <iframe id="mainPlayer" allowfullscreen></iframe>
</div>

<div class="server-list" id="serverButtons"></div>

<script>
    async function getMovie() {
        const id = document.getElementById('tmdbId').value;
        if(!id) return alert("Enter TMDB ID");

        const res = await fetch(`/fetch-movie?id=${id}`);
        const data = await res.json();

        if(data.success) {
            document.getElementById('player-area').style.display = 'block';
            document.getElementById('serverButtons').style.display = 'block';
            
            // Default server 1 load
            document.getElementById('mainPlayer').src = data.servers[0].url;

            // Build server selection buttons like Moviebox
            let btnHtml = "";
            data.servers.forEach(s => {
                btnHtml += `<button class="s-btn" onclick="document.getElementById('mainPlayer').src='${s.url}'">${s.name}</button>`;
            });
            document.getElementById('serverButtons').innerHTML = btnHtml;
        }
    }
</script>

</body>
</html>
