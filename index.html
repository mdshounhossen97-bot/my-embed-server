<!DOCTYPE html>
<html>
<head>
    <title>Shawonflix Premium Player</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #artplayer { width: 90%; max-width: 900px; height: 500px; border-radius: 10px; overflow: hidden; box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
        .input-area { margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 300px; }
        button { padding: 10px 20px; background: #e50914; color: #fff; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="Paste .m3u8 or .mp4 link here">
        <button onclick="loadVideo()">PLAY</button>
    </div>

    <div id="artplayer"></div>

    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        var art = new ArtPlayer({
            container: '#artplayer',
            url: '', // শুরুতে খালি থাকবে
            fullscreen: true,
            setting: true,
            playbackRate: true,
            aspectRatio: true,
            subtitleOffset: true,
            miniProgressBar: true,
            autoSize: true,
            pip: true,
            customHotKey: true,
            type: 'm3u8',
            customType: {
                m3u8: function (video, url) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    }
                },
            },
        });

        function loadVideo() {
            const url = document.getElementById('videoUrl').value;
            if(!url) return alert("Enter link first!");
            
            art.switchUrl(url); // নতুন ভিডিও লোড করবে
            console.log("Playing from: " + url);
        }
    </script>
</body>
</html>
