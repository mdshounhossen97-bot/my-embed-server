<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shawonflix BDIX Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        input { padding: 12px; width: 60%; border-radius: 5px; border: 1px solid #e50914; background: #111; color: #fff; }
        button { padding: 12px 25px; background: #e50914; color: #fff; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #player-wrapper { max-width: 900px; margin: 30px auto; display: none; }
    </style>
</head>
<body>

    <h1>SHAWONFLIX BDIX ENGINE</h1>
    <input type="text" id="mName" placeholder="Movie Name (e.g. Avatar 2)">
    <button onclick="startStream()">PLAY</button>

    <div id="player-wrapper">
        <video id="player" playsinline controls></video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const player = new Plyr('#player');

        async function startStream() {
            const name = document.getElementById('mName').value;
            if(!name) return;

            const res = await fetch(`/fetch-stream?name=${encodeURIComponent(name)}`);
            const data = await res.json();

            if(data.stream_url) {
                document.getElementById('player-wrapper').style.display = 'block';
                player.source = {
                    type: 'video',
                    sources: [{ src: data.stream_url, type: 'video/mp4' }]
                };
                player.play();
            } else {
                alert("Link not found on BDIX server.");
            }
        }
    </script>
</body>
</html>
